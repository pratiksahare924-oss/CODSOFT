<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Glass Calculator</title>
    <meta name="description"
        content="A modern, fully responsive calculator with glassmorphism design and smooth animations. Built with vanilla HTML, CSS, and JS.">
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@300;400;600&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="calculator-wrapper">
        <div class="calculator-container" id="calculator">
            <h1 class="app-title">Calculator</h1>
            <div class="display">
                <div class="previous-operand" id="previous-operand"></div>
                <div class="current-operand" id="current-operand">0</div>
            </div>

            <div class="buttons-grid">
                <button class="btn btn-action" data-action="all-clear">C</button>
                <button class="btn btn-action" data-action="delete">⌫</button>
                <button class="btn btn-operator" data-operator="/">÷</button>
                <button class="btn btn-operator" data-operator="*">×</button>

                <button class="btn btn-number" data-number="7">7</button>
                <button class="btn btn-number" data-number="8">8</button>
                <button class="btn btn-number" data-number="9">9</button>
                <button class="btn btn-operator" data-operator="-">−</button>

                <button class="btn btn-number" data-number="4">4</button>
                <button class="btn btn-number" data-number="5">5</button>
                <button class="btn btn-number" data-number="6">6</button>
                <button class="btn btn-operator" data-operator="+">+</button>

                <button class="btn btn-number" data-number="1">1</button>
                <button class="btn btn-number" data-number="2">2</button>
                <button class="btn btn-number" data-number="3">3</button>
                <button class="btn btn-equals span-two" data-action="calculate">=</button>

                <button class="btn btn-number span-two" data-number="0">0</button>
                <button class="btn btn-number" data-number=".">.</button>
            </div>
        </div>
    </main>

    <script src="script.js" defer></script>
</body>

</html>
